<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in</title>
<style>
  html,body{height:100%;margin:0}
  body{background:#f6f8fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
       color:#24292f;display:flex;align-items:flex-start;justify-content:center}
  .wrap{width:308px;margin-top:96px}
  .mark{display:flex;justify-content:center;margin-bottom:24px}
  .mark svg{fill:#24292f}
  .card{background:#fff;border:1px solid #d0d7de;border-radius:6px;padding:16px}
  label{display:block;font-size:14px;font-weight:600;margin:0 0 6px}
  input{width:100%;box-sizing:border-box;padding:5px 12px;font-size:14px;line-height:20px;
        border:1px solid #d0d7de;border-radius:6px;margin-bottom:16px;background:#f6f8fa}
  input:focus{outline:none;border-color:#0969da;box-shadow:0 0 0 3px rgba(9,105,218,.3);background:#fff}
  button{width:100%;padding:5px 16px;font-size:14px;font-weight:600;color:#fff;background:#1f883d;
         border:1px solid rgba(31,35,40,.15);border-radius:6px;cursor:pointer}
  button:hover{background:#1a7f37}
  .err{color:#cf222e;font-size:13px;margin:-8px 0 12px;min-height:16px}
  .foot{border:1px solid #d0d7de;border-radius:6px;padding:16px;text-align:center;font-size:14px;margin-top:16px;background:#fff}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <svg height="48" viewBox="0 0 16 16" width="48" aria-hidden="true"><path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82-.64-.18-1.32-.27-2-.27-.68 0-1.36.09-2 .27-1.53-1.03-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.19.73.9.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path></svg>
    </div>
    <div class="card">
      <form id="f" autocomplete="off">
        <label for="u">Access ID</label>
        <input id="u" name="u" type="text" autocomplete="off" spellcheck="false">
        <label for="p">Access code</label>
        <input id="p" name="p" type="password" autocomplete="off" spellcheck="false">
        <div class="err" id="e"></div>
        <button type="submit">Sign in</button>
      </form>
    </div>
    <div class="foot">
      Access to this preview is by invitation. Don't have a code?
      <a href="mailto:info@acrostine.com">Request access</a>.
    </div>
  </div>

<script>
var _reg = {
  "demo1":"3XU4EX","demo2":"5QW5SI","demo3":"6AF1JM","demo4":"1JQ3PW","demo5":"2FK2BO",
  "demo6":"7WZ8MU","demo7":"7BC6YW","demo8":"2WD1QP","demo9":"2ZT2XE","demo10":"3NM9MI"
};

function normalizeLocale(s){ return s.replace(/[^A-Za-z0-9]/g,"").toUpperCase().split("").reverse().join(""); }

document.getElementById("f").addEventListener("submit", function(ev){
  ev.preventDefault();
  var e = document.getElementById("e");
  var u = document.getElementById("u").value.trim().toLowerCase();
  var raw = document.getElementById("p").value;
  var want = _reg[u];
  if (want && normalizeLocale(raw) === want){
    window.location.href = "model-f7eafa053a786795.html";
  } else {
    e.textContent = "Incorrect access ID or code.";
    document.getElementById("p").value = "";
  }
});
</script>
</body>
</html>
